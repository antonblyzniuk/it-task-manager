{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<div class="form-page-container">
  <div class="form-page-inner" data-aos="fade-up">
    <div class="form-page-header">
      <div class="form-page-icon">
        <i class="bi bi-folder-plus"></i>
      </div>
      <h2 class="form-page-title">{{ title|default:"Create Project" }}</h2>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          {{ field|as_crispy_field }}
        </div>
      {% endfor %}
      <div class="form-page-actions">
        <a href="{% url 'main:project-list' %}" class="btn btn-outline-secondary rounded-pill px-4">
          <i class="bi bi-arrow-left me-1"></i> Cancel
        </a>
        <button type="submit" class="btn btn-gradient-primary rounded-pill px-4">
          <i class="bi bi-check-circle me-1"></i> Create Project
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
