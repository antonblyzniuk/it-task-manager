{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<div class="form-page-container">
  <div class="form-page-inner" data-aos="fade-up">
    <div class="form-page-header">
      <div class="form-page-icon">
        <i class="bi bi-{% if form.instance.pk %}pencil-square{% else %}plus-circle-fill{% endif %}"></i>
      </div>
      <h2 class="form-page-title">
        {% if form.instance.pk %}Update{% else %}Create{% endif %} Task
      </h2>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          {{ field|as_crispy_field }}
        </div>
      {% endfor %}
      <div class="form-page-actions">
        <a href="{% url 'main:task-list' %}" class="btn btn-outline-secondary rounded-pill px-4">
          <i class="bi bi-arrow-left me-1"></i> Cancel
        </a>
        <button type="submit" class="btn btn-gradient-primary rounded-pill px-4">
          <i class="bi bi-check-circle me-1"></i>
          {% if form.instance.pk %}Update{% else %}Create{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
