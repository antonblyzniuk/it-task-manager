{% extends "base.html" %}

{% block content %}
<div class="delete-page-container">
  <div class="delete-page-card" data-aos="zoom-in">
    <div class="delete-icon-ring">
      <i class="bi bi-tags"></i>
    </div>
    <h2 class="fw-bold mb-2" style="font-size:1.35rem;letter-spacing:-0.02em;">Delete Task Type?</h2>
    <p class="text-muted mb-1">You're about to delete the task type:</p>
    <p class="fw-semibold mb-1" style="font-size:1.05rem;">"{{ object.name }}"</p>
    <p class="text-muted small mb-4">All tasks with this type will also be removed.</p>

    <form method="post" class="d-grid mb-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-lg rounded-pill">
        <i class="bi bi-trash3-fill me-2"></i>Yes, Delete
      </button>
    </form>
    <a href="{% url 'main:task-type-list' %}" class="btn btn-outline-secondary btn-lg rounded-pill w-100">
      Cancel
    </a>
  </div>
</div>
{% endblock %}
